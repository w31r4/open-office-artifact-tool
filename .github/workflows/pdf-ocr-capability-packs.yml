name: OCR PDF capability packs

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Create immutable OCR core and language-pack releases only after every platform probe passes"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# This is a release-only lane. Normal npm installation, root import, and test
# runs never download OCR engines, language models, Python, or native tools.
permissions:
  contents: write
  attestations: write
  artifact-metadata: write
  id-token: write

env:
  OCR_INPUTS: scripts/pdf-provider-ocr-release-inputs.v1.json
  PYTHON_INPUTS: scripts/pdf-provider-python-release-inputs.v1.json
  OCR_CORE_PACK_VERSION: 17.8.1-oat.1
  OCR_LANGUAGE_PACK_VERSION: 4.1.0-oat.1

jobs:
  ocr-core:
    name: OCR core (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-22.04
          - platform: darwin-arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Validate pinned OCR and Python inputs
        shell: bash
        run: |
          set -euo pipefail
          jq -e '
            .schema == "open-office-artifact-tool.pdf-provider-ocr-release-inputs.v1" and
            .schemaVersion == 1 and
            .ocrCore.packId == "ocr-core" and
            .ocrCore.version == "17.8.1-oat.1" and
            (.languages.eng.sha256 | test("^[a-f0-9]{64}$")) and
            (.languages.chi_sim.sha256 | test("^[a-f0-9]{64}$")) and
            (.licenseMaterial.tessdataFastApache20.sha256 | test("^[a-f0-9]{64}$"))
          ' "$OCR_INPUTS"
          test "$(shasum -a 256 "$PYTHON_INPUTS" | awk '{print $1}')" = "$(jq -r '.ocrCore.pythonInputs.sha256' "$OCR_INPUTS")"
          node scripts/build-python-provider-pack.mjs --verify-lock
      - name: Install platform-native OCR build inputs
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.platform }}" = "linux-x64" ]; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends tesseract-ocr tesseract-ocr-eng ghostscript poppler-utils poppler-data libgs9-common fonts-droid-fallback fonts-urw-base35 patchelf
          else
            brew install tesseract ghostscript poppler
          fi
      - name: Build isolated OCRmyPDF Python payload
        shell: bash
        run: |
          set -euo pipefail
          node scripts/build-python-provider-pack.mjs \
            --pack ocr-core \
            --version "$OCR_CORE_PACK_VERSION" \
            --platform "${{ matrix.platform }}" \
            --output "$RUNNER_TEMP/ocr-python" \
            --source-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/blob/$GITHUB_SHA/$PYTHON_INPUTS"
      - name: Add relocatable native OCR sidecars
        shell: bash
        run: |
          set -euo pipefail
          python_archive="$RUNNER_TEMP/ocr-python/ocr-core-$OCR_CORE_PACK_VERSION-${{ matrix.platform }}.tar.gz"
          payload="$RUNNER_TEMP/ocr-payload"
          mkdir -p "$payload"
          tar -xzf "$python_archive" -C "$payload"
          mv "$payload/THIRD_PARTY_NOTICES.md" "$RUNNER_TEMP/ocr-python-notices.md"
          rm "$payload/sbom.cdx.json"
          native_notices="$RUNNER_TEMP/ocr-native-notices.md"
          library_args=()
          poppler_args=()
          resource_args=()
          resource_packages=()
          if [ "${{ matrix.platform }}" = "linux-x64" ]; then
            # The Ghostscript Resource tree contains package-managed CMap,
            # CID fallback, and base-font links. Keep every external target
            # inside this explicit apt-owned allowlist; the pack builder then
            # dereferences only those roots into regular files.
            resource_packages=(libgs9-common poppler-data fonts-droid-fallback fonts-urw-base35)
            tessdata_root="$(dirname "$(dpkg -L tesseract-ocr-eng | awk '/eng\.traineddata$/ { print; exit }')")"
            test -d "$tessdata_root"
            ghostscript_resource="$(find /usr/share/ghostscript -type d -name Resource -print -quit)"
            test -d "$ghostscript_resource"
            resource_roots=()
            used_resource_packages=()
            append_unique() {
              local value="$1"
              shift
              local existing
              for existing in "$@"; do
                if [ "$existing" = "$value" ]; then return 0; fi
              done
              return 1
            }
            record_resource_owner() {
              local candidate="$1"
              local owner=""
              local package
              for package in "${resource_packages[@]}"; do
                if dpkg-query -S "$candidate" 2>/dev/null | cut -d: -f1 | tr ',' '\n' | grep -Fxq "$package"; then
                  owner="$package"
                  break
                fi
              done
              if [ -z "$owner" ]; then
                printf 'unapproved Ghostscript resource target: %s\n' "$candidate" >&2
                return 1
              fi
              if ! append_unique "$owner" "${used_resource_packages[@]}"; then used_resource_packages+=("$owner"); fi
            }
            record_resource_root() {
              local candidate="$1"
              local root="$2"
              if ! append_unique "$root" "${resource_roots[@]}"; then resource_roots+=("$root"); fi
              record_resource_owner "$candidate"
            }
            while IFS= read -r resource_link; do
              resource_target="$(readlink -f "$resource_link")"
              test -e "$resource_target"
              case "$resource_target" in "$ghostscript_resource"/*) continue ;; esac
              if [ -d "$resource_target" ]; then
                # `Resource/CMap` is a directory symlink on Ubuntu. The
                # directory itself and every resolved leaf must be owned by
                # our declared package set before it may become a trusted
                # resource root.
                if ! append_unique "$(dirname "$resource_target")" "${resource_roots[@]}"; then resource_roots+=("$(dirname "$resource_target")"); fi
                resource_files=0
                while IFS= read -r resource_file; do
                  resource_files=1
                  # `find -L` reports the link's spelling. Record the
                  # resolved leaf instead so treeCopy receives the actual
                  # external Poppler/apt root rather than only the CMap link
                  # directory that contains it.
                  resource_actual="$(readlink -f "$resource_file")"
                  test -f "$resource_actual"
                  record_resource_root "$resource_actual" "$(dirname "$resource_actual")"
                done < <(find -L "$resource_target" -type f -print | LC_ALL=C sort)
                if [ "$resource_files" = 0 ]; then record_resource_root "$resource_target" "$(dirname "$resource_target")"; fi
              else
                record_resource_root "$resource_target" "$(dirname "$resource_target")"
              fi
            done < <(find "$ghostscript_resource" -type l -print | LC_ALL=C sort)
            for resource_root in "${resource_roots[@]}"; do resource_args+=(--resource-root "$resource_root"); done
            for package in "${resource_packages[@]}"; do
              test -r "/usr/share/doc/$package/copyright"
              dpkg-query -W -f='${Package} ${Version}\n' "$package" > "$RUNNER_TEMP/$package-package.txt"
            done
            library_args+=(--library-root /usr/lib/x86_64-linux-gnu)
            if [ -d /usr/share/poppler ]; then poppler_args+=(--poppler-root /usr/share/poppler); fi
            node scripts/build-ocr-native-payload.mjs \
              --platform linux-x64 \
              --payload "$payload" \
              --notices "$native_notices" \
              --tesseract /usr/bin/tesseract \
              --ghostscript /usr/bin/gs \
              --pdftotext /usr/bin/pdftotext \
              --ghostscript-root /usr/share/ghostscript \
              --tessdata-root "$tessdata_root" \
              "${resource_args[@]}" \
              "${poppler_args[@]}" \
              "${library_args[@]}"
          else
            # A one-formula `brew deps` invocation on an installed formula
            # reports its actual runtime closure. Calling it separately keeps
            # the union without switching to the declared (and incomplete)
            # dependency graph that a multi-formula invocation would use.
            formulae=(tesseract ghostscript poppler)
            while IFS= read -r formula; do
              if [ -n "$formula" ]; then formulae+=("$formula"); fi
            done < <(for root_formula in tesseract ghostscript poppler; do brew deps "$root_formula"; done | LC_ALL=C sort -u)
            for formula in "${formulae[@]}"; do
              prefix="$(brew --prefix "$formula")"
              if [ -d "$prefix/lib" ]; then library_args+=(--library-root "$prefix/lib"); fi
            done
            node scripts/build-ocr-native-payload.mjs \
              --platform darwin-arm64 \
              --payload "$payload" \
              --notices "$native_notices" \
              --tesseract "$(brew --prefix tesseract)/bin/tesseract" \
              --ghostscript "$(brew --prefix ghostscript)/bin/gs" \
              --pdftotext "$(brew --prefix poppler)/bin/pdftotext" \
              --ghostscript-root "$(brew --prefix ghostscript)/share/ghostscript" \
              --poppler-root "$(brew --prefix poppler)/share/poppler" \
              --tessdata-root "$(brew --prefix tesseract)/share/tessdata" \
              "${library_args[@]}"
          fi
          {
            cat "$RUNNER_TEMP/ocr-python-notices.md"
            printf '\n\n# Native OCR sidecars\n\n'
            cat "$native_notices"
            if [ "${{ matrix.platform }}" = "linux-x64" ]; then
              for package in "${resource_packages[@]}"; do
                printf '\n\n## %s build input\n\n' "$package"
                cat "$RUNNER_TEMP/$package-package.txt"
                printf '\n'
                cat "/usr/share/doc/$package/copyright"
              done
            fi
          } > "$RUNNER_TEMP/ocr-notices.md"
          inputs_sha="$(shasum -a 256 "$OCR_INPUTS" | awk '{print $1}')"
          node scripts/build-pdf-provider-pack.mjs \
            --pack ocr-core \
            --version "$OCR_CORE_PACK_VERSION" \
            --platform "${{ matrix.platform }}" \
            --payload "$payload" \
            --output "$RUNNER_TEMP/ocr-core-release" \
            --source-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/blob/$GITHUB_SHA/$OCR_INPUTS" \
            --source-sha256 "$inputs_sha" \
            --license "$(jq -r '.ocrCore.license' "$OCR_INPUTS")" \
            --notices "$RUNNER_TEMP/ocr-notices.md"
      - name: Verify extracted OCR core is self-contained and language-free
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/ocr-core-release/ocr-core-$OCR_CORE_PACK_VERSION-${{ matrix.platform }}.tar.gz"
          destination="$RUNNER_TEMP/ocr-core-consumer"
          home="$RUNNER_TEMP/ocr-home"
          mkdir -p "$destination" "$home"
          tar -xzf "$archive" -C "$destination"
          test -x "$destination/bin/ocrmypdf"
          test -x "$destination/bin/tesseract"
          test -x "$destination/bin/gs"
          test -x "$destination/bin/pdftotext"
          test ! -e "$destination/bin/pip"
          test -z "$(find "$destination/share/tessdata" -type f -name '*.traineddata' -print -quit)"
          run_probe() {
            local name="$1"
            shift
            local output="$RUNNER_TEMP/$name-version.txt"
            if ! env -i HOME="$home" PATH="$destination/bin:/usr/bin:/bin" "$@" > "$output" 2>&1; then
              cat "$output" >&2
              return 1
            fi
            printf '%s\n' "$output"
          }
          ocrmypdf_version="$(run_probe ocrmypdf "$destination/bin/ocrmypdf" --version)"
          tesseract_version="$(run_probe tesseract "$destination/bin/tesseract" --version)"
          ghostscript_version="$(run_probe ghostscript "$destination/bin/gs" --version)"
          pdftotext_version="$(run_probe pdftotext "$destination/bin/pdftotext" -v)"
          grep -Fx 17.8.1 "$ocrmypdf_version" || { cat "$ocrmypdf_version" >&2; exit 2; }
          grep -q '^tesseract 5\.' "$tesseract_version" || { cat "$tesseract_version" >&2; exit 2; }
          grep -q '^[0-9]' "$ghostscript_version" || { cat "$ghostscript_version" >&2; exit 2; }
          grep -q 'Poppler' "$pdftotext_version" || { cat "$pdftotext_version" >&2; exit 2; }
      - name: Attest immutable OCR core provenance
        if: ${{ inputs.publish == 'true' }}
        uses: actions/attest@v4
        with:
          subject-path: ${{ runner.temp }}/ocr-core-release/*.tar.gz
      - name: Attest OCR core SBOM
        if: ${{ inputs.publish == 'true' }}
        uses: actions/attest@v4
        with:
          subject-path: ${{ runner.temp }}/ocr-core-release/ocr-core-${{ env.OCR_CORE_PACK_VERSION }}-${{ matrix.platform }}.tar.gz
          sbom-path: ${{ runner.temp }}/ocr-core-release/ocr-core-${{ env.OCR_CORE_PACK_VERSION }}-${{ matrix.platform }}.sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: ocr-core-${{ matrix.platform }}
          path: ${{ runner.temp }}/ocr-core-release/
          if-no-files-found: error
          retention-days: 14

  ocr-language:
    name: OCR language ${{ matrix.language }} (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: eng
            pack: ocr-language-eng
            platform: linux-x64
            runner: ubuntu-22.04
          - language: eng
            pack: ocr-language-eng
            platform: darwin-arm64
            runner: macos-14
          - language: chi_sim
            pack: ocr-language-chi-sim
            platform: linux-x64
            runner: ubuntu-22.04
          - language: chi_sim
            pack: ocr-language-chi-sim
            platform: darwin-arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Build a hash-pinned language-data pack
        shell: bash
        run: |
          set -euo pipefail
          language="${{ matrix.language }}"
          pack="${{ matrix.pack }}"
          url="$(jq -r --arg language "$language" '.languages[$language].url' "$OCR_INPUTS")"
          sha="$(jq -r --arg language "$language" '.languages[$language].sha256' "$OCR_INPUTS")"
          bytes="$(jq -r --arg language "$language" '.languages[$language].downloadBytes' "$OCR_INPUTS")"
          version="$(jq -r --arg language "$language" '.languages[$language].version' "$OCR_INPUTS")"
          license="$(jq -r --arg language "$language" '.languages[$language].license' "$OCR_INPUTS")"
          test "$version" = "$OCR_LANGUAGE_PACK_VERSION"
          payload="$RUNNER_TEMP/$pack-payload"
          mkdir -p "$payload/share/tessdata"
          data="$payload/share/tessdata/$language.traineddata"
          curl --fail --location --retry 3 --proto '=https' --tlsv1.2 "$url" --output "$data"
          test "$(wc -c < "$data" | tr -d ' ')" = "$bytes"
          echo "$sha  $data" | shasum -a 256 --check --status
          license_url="$(jq -r '.licenseMaterial.tessdataFastApache20.url' "$OCR_INPUTS")"
          license_sha="$(jq -r '.licenseMaterial.tessdataFastApache20.sha256' "$OCR_INPUTS")"
          license_bytes="$(jq -r '.licenseMaterial.tessdataFastApache20.downloadBytes' "$OCR_INPUTS")"
          license_file="$RUNNER_TEMP/tessdata-fast-LICENSE.txt"
          curl --fail --location --retry 3 --proto '=https' --tlsv1.2 "$license_url" --output "$license_file"
          test "$(wc -c < "$license_file" | tr -d ' ')" = "$license_bytes"
          echo "$license_sha  $license_file" | shasum -a 256 --check --status
          {
            printf '%s\n\n' "# Tesseract $language language-data notice"
            printf '%s\n\n' "This immutable pack contains only tessdata_fast 4.1.0 $language.traineddata, downloaded from $url and SHA-256 verified before packaging."
            cat "$license_file"
          } > "$RUNNER_TEMP/$pack-notices.md"
          node scripts/build-pdf-provider-pack.mjs \
            --pack "$pack" \
            --version "$version" \
            --platform "${{ matrix.platform }}" \
            --payload "$payload" \
            --output "$RUNNER_TEMP/$pack-release" \
            --source-url "$url" \
            --source-sha256 "$sha" \
            --license "$license" \
            --notices "$RUNNER_TEMP/$pack-notices.md"
      - name: Verify extracted language-data bytes
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/${{ matrix.pack }}-release/${{ matrix.pack }}-$OCR_LANGUAGE_PACK_VERSION-${{ matrix.platform }}.tar.gz"
          destination="$RUNNER_TEMP/${{ matrix.pack }}-consumer"
          mkdir -p "$destination"
          tar -xzf "$archive" -C "$destination"
          test -f "$destination/share/tessdata/${{ matrix.language }}.traineddata"
          test "$(find "$destination/share/tessdata" -type f | wc -l | tr -d ' ')" = 1
      - name: Attest immutable OCR language-pack provenance
        if: ${{ inputs.publish == 'true' }}
        uses: actions/attest@v4
        with:
          subject-path: ${{ runner.temp }}/${{ matrix.pack }}-release/*.tar.gz
      - name: Attest OCR language-pack SBOM
        if: ${{ inputs.publish == 'true' }}
        uses: actions/attest@v4
        with:
          subject-path: ${{ runner.temp }}/${{ matrix.pack }}-release/${{ matrix.pack }}-${{ env.OCR_LANGUAGE_PACK_VERSION }}-${{ matrix.platform }}.tar.gz
          sbom-path: ${{ runner.temp }}/${{ matrix.pack }}-release/${{ matrix.pack }}-${{ env.OCR_LANGUAGE_PACK_VERSION }}-${{ matrix.platform }}.sbom.cdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pack }}-${{ matrix.platform }}
          path: ${{ runner.temp }}/${{ matrix.pack }}-release/
          if-no-files-found: error
          retention-days: 14

  release-ocr-core:
    name: assemble OCR core release manifest
    needs: ocr-core
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - uses: actions/download-artifact@v5
        with:
          pattern: ocr-core-*
          path: ${{ runner.temp }}/ocr-core-platforms
          merge-multiple: true
      - name: Combine audited OCR core manifests
        shell: bash
        run: |
          set -euo pipefail
          tag="pdf-provider-ocr-core-$OCR_CORE_PACK_VERSION"
          node scripts/finalize-pdf-provider-release.mjs \
            --pack ocr-core \
            --version "$OCR_CORE_PACK_VERSION" \
            --input "$RUNNER_TEMP/ocr-core-platforms" \
            --output "$RUNNER_TEMP/ocr-core-final" \
            --release-base-url "https://github.com/$GITHUB_REPOSITORY/releases/download/$tag/" \
            --repository "$GITHUB_REPOSITORY" \
            --workflow .github/workflows/pdf-ocr-capability-packs.yml
          jq -e '.catalogFragment.state == "published" and (.catalogFragment.artifacts | length == 2)' "$RUNNER_TEMP/ocr-core-final/ocr-core-$OCR_CORE_PACK_VERSION.release-manifest.json"
      - name: Attest OCR core release evidence
        if: ${{ inputs.publish == 'true' }}
        uses: actions/attest@v4
        with:
          subject-path: ${{ runner.temp }}/ocr-core-final/*
      - uses: actions/upload-artifact@v4
        with:
          name: ocr-core-release-manifest
          path: ${{ runner.temp }}/ocr-core-final/
          if-no-files-found: error
          retention-days: 14
      - name: Publish immutable OCR core release assets
        if: ${{ inputs.publish == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="pdf-provider-ocr-core-$OCR_CORE_PACK_VERSION"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Refusing to mutate existing release $tag" >&2
            exit 2
          fi
          gh release create "$tag" --target "$GITHUB_SHA" --title "PDF capability pack: OCR core $OCR_CORE_PACK_VERSION" --notes "Hash-pinned OCRmyPDF, Tesseract, Ghostscript, and pdftotext core. Language data is separately released and must be explicitly authorized. The npm catalog does not advertise these assets until a reviewed digest-pinning update. Verify assets with: gh attestation verify <asset> --repo $GITHUB_REPOSITORY"
          gh release upload "$tag" "$RUNNER_TEMP/ocr-core-platforms"/* "$RUNNER_TEMP/ocr-core-final"/*

  release-ocr-language:
    name: assemble ${{ matrix.pack }} release manifest
    needs: ocr-language
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: eng
            pack: ocr-language-eng
          - language: chi_sim
            pack: ocr-language-chi-sim
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - uses: actions/download-artifact@v5
        with:
          pattern: ${{ matrix.pack }}-*
          path: ${{ runner.temp }}/${{ matrix.pack }}-platforms
          merge-multiple: true
      - name: Combine audited language manifests
        shell: bash
        run: |
          set -euo pipefail
          tag="pdf-provider-${{ matrix.pack }}-$OCR_LANGUAGE_PACK_VERSION"
          node scripts/finalize-pdf-provider-release.mjs \
            --pack "${{ matrix.pack }}" \
            --version "$OCR_LANGUAGE_PACK_VERSION" \
            --input "$RUNNER_TEMP/${{ matrix.pack }}-platforms" \
            --output "$RUNNER_TEMP/${{ matrix.pack }}-final" \
            --release-base-url "https://github.com/$GITHUB_REPOSITORY/releases/download/$tag/" \
            --repository "$GITHUB_REPOSITORY" \
            --workflow .github/workflows/pdf-ocr-capability-packs.yml
          jq -e '.catalogFragment.state == "published" and (.catalogFragment.artifacts | length == 2)' "$RUNNER_TEMP/${{ matrix.pack }}-final/${{ matrix.pack }}-$OCR_LANGUAGE_PACK_VERSION.release-manifest.json"
      - name: Attest OCR language release evidence
        if: ${{ inputs.publish == 'true' }}
        uses: actions/attest@v4
        with:
          subject-path: ${{ runner.temp }}/${{ matrix.pack }}-final/*
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pack }}-release-manifest
          path: ${{ runner.temp }}/${{ matrix.pack }}-final/
          if-no-files-found: error
          retention-days: 14
      - name: Publish immutable language-pack release assets
        if: ${{ inputs.publish == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="pdf-provider-${{ matrix.pack }}-$OCR_LANGUAGE_PACK_VERSION"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Refusing to mutate existing release $tag" >&2
            exit 2
          fi
          gh release create "$tag" --target "$GITHUB_SHA" --title "PDF capability pack: ${{ matrix.pack }} $OCR_LANGUAGE_PACK_VERSION" --notes "Hash-pinned Tesseract ${{ matrix.language }} language data. It is installed only after explicit project policy authorization and is never a silent OCR fallback. Verify assets with: gh attestation verify <asset> --repo $GITHUB_REPOSITORY"
          gh release upload "$tag" "$RUNNER_TEMP/${{ matrix.pack }}-platforms"/* "$RUNNER_TEMP/${{ matrix.pack }}-final"/*
