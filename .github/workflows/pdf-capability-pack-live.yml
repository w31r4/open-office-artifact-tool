name: PDF capability-pack live verification

on:
  workflow_dispatch:

# This is intentionally separate from ordinary CI. It downloads only already
# published, catalog-pinned assets and proves the public resolver/installer
# path on each supported platform; regular npm tests never trigger it.
permissions:
  contents: read
  attestations: read

jobs:
  qpdf-managed-pack:
    name: qpdf managed pack (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-22.04
          - platform: darwin-arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Resolve, install, and probe the published qpdf pack
        env:
          OPEN_OFFICE_PDF_LIVE_PACK_TEST: "1"
        run: node test/pdf-qpdf-managed-release.mjs
      - name: Verify the release asset's GitHub attestation
        env:
          GH_TOKEN: ${{ github.token }}
          PACK_PLATFORM: ${{ matrix.platform }}
        shell: bash
        run: |
          set -euo pipefail
          metadata="$(node --input-type=module --eval '
            import { PDF_PROVIDER_CATALOG } from "./src/pdf/providers/index.mjs";
            const pack = PDF_PROVIDER_CATALOG.packs.qpdf;
            const artifact = pack.artifacts.find((entry) => entry.platform === process.env.PACK_PLATFORM);
            if (!artifact) throw new Error(`missing qpdf artifact for ${process.env.PACK_PLATFORM}`);
            process.stdout.write(JSON.stringify({ tag: `pdf-provider-qpdf-${pack.version}`, asset: artifact.asset }));
          ')"
          tag="$(jq -r .tag <<<"$metadata")"
          asset="$(jq -r .asset <<<"$metadata")"
          gh release download "$tag" --pattern "$asset" --dir "$RUNNER_TEMP/qpdf-attestation"
          gh attestation verify "$RUNNER_TEMP/qpdf-attestation/$asset" --repo "$GITHUB_REPOSITORY"

  python-managed-pack:
    name: ${{ matrix.pack }} managed pack (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-22.04
            pack: python-foundation
          - platform: darwin-arm64
            runner: macos-14
            pack: python-foundation
          - platform: linux-x64
            runner: ubuntu-22.04
            pack: python-specialists
          - platform: darwin-arm64
            runner: macos-14
            pack: python-specialists
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Resolve, install, and probe the published Python pack
        env:
          OPEN_OFFICE_PDF_LIVE_PACK_TEST: "1"
          OPEN_OFFICE_PDF_LIVE_PACK: ${{ matrix.pack }}
        run: node test/pdf-python-managed-release.mjs
      - name: Verify the release asset's GitHub attestation
        env:
          GH_TOKEN: ${{ github.token }}
          PACK_PLATFORM: ${{ matrix.platform }}
          PACK_ID: ${{ matrix.pack }}
        shell: bash
        run: |
          set -euo pipefail
          metadata="$(node --input-type=module --eval '
            import { PDF_PROVIDER_CATALOG } from "./src/pdf/providers/index.mjs";
            const pack = PDF_PROVIDER_CATALOG.packs[process.env.PACK_ID];
            const artifact = pack.artifacts.find((entry) => entry.platform === process.env.PACK_PLATFORM);
            if (!artifact) throw new Error(`missing ${process.env.PACK_ID} artifact for ${process.env.PACK_PLATFORM}`);
            process.stdout.write(JSON.stringify({ tag: `pdf-provider-${process.env.PACK_ID}-${pack.version}`, asset: artifact.asset }));
          ')"
          tag="$(jq -r .tag <<<"$metadata")"
          asset="$(jq -r .asset <<<"$metadata")"
          gh release download "$tag" --pattern "$asset" --dir "$RUNNER_TEMP/$PACK_ID-attestation"
          gh attestation verify "$RUNNER_TEMP/$PACK_ID-attestation/$asset" --repo "$GITHUB_REPOSITORY"

  ocr-managed-pack:
    name: OCR managed pack (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-24.04
          - platform: darwin-arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Resolve, install, and probe the published OCR closure
        env:
          OPEN_OFFICE_PDF_LIVE_PACK_TEST: "1"
        run: node test/pdf-ocr-managed-release.mjs
      - name: Verify the release assets' GitHub attestations
        env:
          GH_TOKEN: ${{ github.token }}
          PACK_PLATFORM: ${{ matrix.platform }}
        shell: bash
        run: |
          set -euo pipefail
          metadata="$(node --input-type=module --eval '
            import { PDF_PROVIDER_CATALOG } from "./src/pdf/providers/index.mjs";
            const ids = ["qpdf", "ocr-core", "ocr-language-eng", "ocr-language-chi-sim"];
            const records = ids.map((id) => {
              const pack = PDF_PROVIDER_CATALOG.packs[id];
              const artifact = pack.artifacts.find((entry) => entry.platform === process.env.PACK_PLATFORM);
              if (!artifact) throw new Error("missing " + id + " artifact for " + process.env.PACK_PLATFORM);
              return { tag: "pdf-provider-" + id + "-" + pack.version, asset: artifact.asset };
            });
            process.stdout.write(JSON.stringify(records));
          ')"
          jq -c '.[]' <<<"$metadata" | while IFS= read -r record; do
            tag="$(jq -r .tag <<<"$record")"
            asset="$(jq -r .asset <<<"$record")"
            destination="$RUNNER_TEMP/ocr-attestation/$tag"
            mkdir -p "$destination"
            gh release download "$tag" --pattern "$asset" --dir "$destination"
            gh attestation verify "$destination/$asset" --repo "$GITHUB_REPOSITORY"
          done

  verapdf-managed-pack:
    name: veraPDF managed pack (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-24.04
          - platform: darwin-arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Resolve, install, and probe the published veraPDF pack
        env:
          OPEN_OFFICE_PDF_LIVE_PACK_TEST: "1"
        run: node test/pdf-verapdf-managed-release.mjs
      - name: Verify the release asset's GitHub attestation
        env:
          GH_TOKEN: ${{ github.token }}
          PACK_PLATFORM: ${{ matrix.platform }}
        shell: bash
        run: |
          set -euo pipefail
          metadata="$(node --input-type=module --eval '
            import { PDF_PROVIDER_CATALOG } from "./src/pdf/providers/index.mjs";
            const pack = PDF_PROVIDER_CATALOG.packs.verapdf;
            const artifact = pack.artifacts.find((entry) => entry.platform === process.env.PACK_PLATFORM);
            if (!artifact) throw new Error("missing veraPDF artifact for " + process.env.PACK_PLATFORM);
            process.stdout.write(JSON.stringify({ tag: "pdf-provider-verapdf-" + pack.version, asset: artifact.asset }));
          ')"
          tag="$(jq -r .tag <<<"$metadata")"
          asset="$(jq -r .asset <<<"$metadata")"
          gh release download "$tag" --pattern "$asset" --dir "$RUNNER_TEMP/verapdf-attestation"
          gh attestation verify "$RUNNER_TEMP/verapdf-attestation/$asset" --repo "$GITHUB_REPOSITORY"
