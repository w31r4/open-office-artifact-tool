name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: npm ci
      - name: Install Chromium and native render tools
        run: |
          npx playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-writer libreoffice-calc libreoffice-impress poppler-utils
      - name: Verify render/runtime tools
        run: |
          node -e "const fs = require('fs'); const { chromium } = require('playwright'); if (!fs.existsSync(chromium.executablePath())) process.exit(1)"
          soffice --version
          pdftoppm -v
          pdfinfo -v
          dotnet --version
      - run: npm test
      - run: npm run docs:api
      - run: node scripts/release-check.mjs --json --skip-network --skip-commands
      - run: git diff --exit-code docs/api.md
      - run: npm run test:pack
      - run: dotnet test native/OfficeBridge
