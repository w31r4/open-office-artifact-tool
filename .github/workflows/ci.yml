name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run docs:api
      - run: git diff --exit-code docs/api.md
      - run: npm run test:pack
      - name: Optional native Office bridge tests
        shell: bash
        run: |
          if [ -d native/OfficeBridge ] && command -v dotnet >/dev/null 2>&1; then
            dotnet test native/OfficeBridge
          else
            echo "Skipping dotnet native Office bridge tests: native/OfficeBridge or dotnet is unavailable."
          fi
