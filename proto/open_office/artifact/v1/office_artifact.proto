syntax = "proto3";

package open_office.artifact.v1;

option csharp_namespace = "OpenOffice.Artifact.Wire.V1";

// This is an independently designed public wire contract for the clean-room
// implementation. Field numbers are part of this project's public API.
enum ArtifactFamily {
  ARTIFACT_FAMILY_UNSPECIFIED = 0;
  ARTIFACT_FAMILY_WORKBOOK = 1;
  ARTIFACT_FAMILY_PRESENTATION = 2;
  ARTIFACT_FAMILY_DOCUMENT = 3;
}

enum CodecOperation {
  CODEC_OPERATION_UNSPECIFIED = 0;
  CODEC_OPERATION_IMPORT_XLSX = 1;
  CODEC_OPERATION_EXPORT_XLSX = 2;
  CODEC_OPERATION_IMPORT_DOCX = 3;
  CODEC_OPERATION_EXPORT_DOCX = 4;
  CODEC_OPERATION_IMPORT_PPTX = 5;
  CODEC_OPERATION_EXPORT_PPTX = 6;
}

enum DiagnosticSeverity {
  DIAGNOSTIC_SEVERITY_UNSPECIFIED = 0;
  DIAGNOSTIC_SEVERITY_INFO = 1;
  DIAGNOSTIC_SEVERITY_WARNING = 2;
  DIAGNOSTIC_SEVERITY_ERROR = 3;
}

enum WorkbookDateSystem {
  WORKBOOK_DATE_SYSTEM_UNSPECIFIED = 0;
  WORKBOOK_DATE_SYSTEM_1900 = 1;
  WORKBOOK_DATE_SYSTEM_1904 = 2;
}

message CodecLimits {
  uint64 max_input_bytes = 1;
  uint64 max_uncompressed_bytes = 2;
  uint32 max_parts = 3;
  uint32 max_sheets = 4;
  uint64 max_cells = 5;
  uint32 max_compression_ratio = 6;
}

message CodecRequest {
  uint32 protocol_version = 1;
  CodecOperation operation = 2;
  ArtifactFamily family = 3;
  ArtifactEnvelope artifact = 4;
  bytes file = 5;
  CodecLimits limits = 6;
  bool allow_lossy = 7;
}

message CodecResponse {
  uint32 protocol_version = 1;
  bool ok = 2;
  bytes file = 3;
  ArtifactEnvelope artifact = 4;
  repeated Diagnostic diagnostics = 5;
}

message ArtifactEnvelope {
  uint32 protocol_version = 1;
  ArtifactFamily family = 2;
  SourceIdentity source = 3;
  repeated Asset assets = 4;
  repeated Diagnostic diagnostics = 5;
  OpaqueOpcGraph opaque_opc = 6;

  oneof payload {
    WorkbookArtifact workbook = 10;
    PresentationArtifact presentation = 11;
    DocumentArtifact document = 12;
  }
}

message SourceIdentity {
  string format = 1;
  string package_sha256 = 2;
  string producer = 3;
  string source_name = 4;
}

message Asset {
  string id = 1;
  string file_name = 2;
  string content_type = 3;
  bytes data = 4;
  string sha256 = 5;
}

message Diagnostic {
  DiagnosticSeverity severity = 1;
  string code = 2;
  string message = 3;
  string source_path = 4;
  string source_identity = 5;
}

message OpaqueOpcGraph {
  repeated OpaqueOpcPart parts = 1;
  repeated OpaqueOpcRelationship package_relationships = 2;
  SourcePackageSnapshot source_package = 3;
}

// A bounded, hash-bound copy of the imported OPC package. The Open XML SDK
// codec uses it as the preservation base while semantic coverage is migrating;
// unsupported parts are never reconstructed from undocumented assumptions.
message SourcePackageSnapshot {
  bytes data = 1;
  string sha256 = 2;
}

message OpaqueOpcPart {
  string path = 1;
  string content_type = 2;
  bytes data = 3;
  repeated OpaqueOpcRelationship relationships = 4;
  string sha256 = 5;
}

message OpaqueOpcRelationship {
  string id = 1;
  string type = 2;
  string target = 3;
  string target_mode = 4;
  string source_path = 5;
}

message WorkbookArtifact {
  string id = 1;
  WorkbookDateSystem date_system = 2;
  repeated WorksheetArtifact worksheets = 3;
}

message WorksheetArtifact {
  string id = 1;
  string name = 2;
  repeated CellArtifact cells = 3;
  bool show_grid_lines = 4;
  FreezePane freeze_pane = 5;
  repeated ColumnDimension column_dimensions = 6;
  repeated RowDimension row_dimensions = 7;
  repeated string merged_ranges = 8;
}

message CellArtifact {
  uint32 row = 1;
  uint32 column = 2;
  string formula = 3;

  oneof value {
    string string_value = 10;
    double number_value = 11;
    bool bool_value = 12;
    string error_value = 13;
  }
}

message FreezePane {
  uint32 rows = 1;
  uint32 columns = 2;
  string top_left_cell = 3;
  string active_pane = 4;
}

message ColumnDimension {
  uint32 column = 1;
  double width = 2;
  bool hidden = 3;
  bool best_fit = 4;
}

message RowDimension {
  uint32 row = 1;
  double height = 2;
  bool hidden = 3;
}

message PresentationArtifact {
  string id = 1;
  string name = 2;
  int64 slide_width_emu = 3;
  int64 slide_height_emu = 4;
  repeated PresentationSlide slides = 5;
  // Package-level identity remains separate from effective slide formatting.
  // Source-bound exports require the original master/layout topology.
  repeated PresentationMaster masters = 6;
  repeated PresentationLayout layouts = 7;
}

message PresentationSlide {
  string id = 1;
  string name = 2;
  repeated PresentationElement elements = 3;
  PresentationSlideSourceBinding source = 4;
  // Stable public locator for the source layout, not an inherited style
  // snapshot. Changing this binding is outside the current bounded slice.
  string layout_id = 5;
}

message PresentationSlideSourceBinding {
  uint32 slide_index = 1;
  string part_path = 2;
  string relationship_id = 3;
  string slide_xml_sha256 = 4;
  string layout_relationship_id = 5;
}

// The first bounded package-level PresentationML slice exposes every source
// master and layout as a hash-bound locator while keeping graph topology
// read-only. Master p:txStyles defaults, direct backgrounds, and owner-local
// placeholder text are modeled for source-preserving edits.
message PresentationMaster {
  string id = 1;
  string name = 2;
  PresentationMasterSourceBinding source = 3;
  PresentationMasterTextStyles text_styles = 4;
  // Direct p:bg only. Absence preserves source state and does not flatten
  // theme or layout inheritance into a computed color.
  PresentationBackground background = 5;
  // Direct p:sp/p:nvSpPr/p:nvPr/p:ph entries in master shape-tree order.
  // Position, geometry, fill, and effective inherited style remain source XML.
  repeated PresentationPlaceholder placeholders = 6;
}

message PresentationMasterSourceBinding {
  uint32 master_index = 1;
  string part_path = 2;
  string relationship_id = 3;
  string master_xml_sha256 = 4;
  string text_styles_semantic_sha256 = 5;
  bool text_styles_editable = 6;
  string background_semantic_sha256 = 7;
  bool background_editable = 8;
}

message PresentationLayout {
  string id = 1;
  string name = 2;
  string master_id = 3;
  string type = 4;
  PresentationLayoutSourceBinding source = 5;
  // Direct layout p:bg only; absence inherits from the linked master.
  PresentationBackground background = 6;
  // Direct layout placeholders only; inherited master placeholders are not
  // duplicated into this owner-local list.
  repeated PresentationPlaceholder placeholders = 7;
}

message PresentationLayoutSourceBinding {
  // Index is local to the owning master's p:sldLayoutIdLst.
  uint32 layout_index = 1;
  string part_path = 2;
  string relationship_id = 3;
  string layout_xml_sha256 = 4;
  string background_semantic_sha256 = 5;
  bool background_editable = 6;
}

// Bounded direct PresentationML background. Color transforms, gradient,
// pattern, image, group, and effect-bearing fills remain source-bound.
message PresentationBackground {
  oneof color {
    string color_rgb = 1;
    string color_scheme = 2;
  }
  oneof kind {
    bool solid = 3;
    uint32 style_reference_index = 4;
  }
}

// Bounded owner-local placeholder semantics. Type/index/name are identity and
// remain read-only for a source-bound package. Only text_body participates in
// the initial edit slice; all shape-level and unmodeled p:ph attributes stay
// behind the element and residual hashes.
message PresentationPlaceholder {
  string id = 1;
  string name = 2;
  string type = 3;
  uint32 index = 4;
  PresentationTextBody text_body = 5;
  PresentationElementSourceBinding source = 6;
}

message PresentationMasterTextStyles {
  // Each level uses PresentationTextParagraph's required 0-based level and
  // bounded paragraph-property fields. Runs are forbidden. Omitted levels
  // preserve source state; deleted_* entries explicitly scrub only modeled
  // fields and remove the native level when no residual content remains.
  repeated PresentationTextParagraph title_levels = 1;
  repeated PresentationTextParagraph body_levels = 2;
  repeated PresentationTextParagraph other_levels = 3;
  repeated uint32 deleted_title_levels = 4;
  repeated uint32 deleted_body_levels = 5;
  repeated uint32 deleted_other_levels = 6;
}

message PresentationElement {
  string id = 1;
  string name = 2;
  PresentationElementSourceBinding source = 3;

  oneof content {
    PresentationShape shape = 10;
    PresentationOpaqueElement opaque = 11;
  }
}

// Shape-tree indexes refer to top-level children after the required group
// non-visual and group transform records. They bind semantic objects to the
// exact source element without exposing a private implementation contract.
message PresentationElementSourceBinding {
  uint32 shape_tree_index = 1;
  string element_sha256 = 2;
  string semantic_sha256 = 3;
  bool editable = 4;
}

message PresentationShape {
  string geometry = 1;
  int64 left_emu = 2;
  int64 top_emu = 3;
  int64 width_emu = 4;
  int64 height_emu = 5;
  // Flattened compatibility view. Writers should keep this equal to text_body
  // paragraphs joined with line feeds. Legacy single-run writers may set only
  // this field; multi-paragraph/run payloads must keep both views equal.
  string text = 6;
  string fill_rgb = 7;
  string line_rgb = 8;
  int64 line_width_emu = 9;
  PresentationTextBody text_body = 10;
}

// The public PresentationML text slice models agent-facing paragraph/inlines,
// list-marker/direct marker-style semantics, content-addressed or external
// picture bullets, tab stops, direct left-margin/hanging-indent layout,
// direct paragraph spacing/default-run styles, bounded text-body layout, and
// bounded click links.
// Transformed or non-sRGB/non-theme marker colors, custom-show/mouse-over
// links, field paragraph properties, and unmodeled master/layout content stay
// source-bound. Shape-local list levels and master p:txStyles levels reuse the
// bounded fields below.
message PresentationTextBody {
  repeated PresentationTextParagraph paragraphs = 1;
  // Text-body list defaults keyed by each paragraph message's required level
  // field (0 through 8). Runs are forbidden here. An empty list preserves
  // unknown source list-style content during a source-bound edit.
  repeated PresentationTextParagraph list_styles = 2;
  // Explicitly removes the modeled lvl1pPr through lvl9pPr children while
  // retaining any unmodeled list-style content.
  optional bool no_list_styles = 3;
  PresentationTextBodyProperties body_properties = 4;
}

// Bounded a:bodyPr semantics. Each unset choice preserves source state; each
// explicit no_* choice removes only the modeled attribute or AutoFit child.
// Insets and column spacing use DrawingML EMUs; rotation retains native
// 1/60000-degree units. WordArt vertical modes, paragraph compatibility flags,
// warp/3D, and attributed normAutofit remain source-bound.
message PresentationTextBodyProperties {
  oneof left_inset {
    int64 left_inset_emu = 1;
    bool no_left_inset = 2;
  }
  oneof top_inset {
    int64 top_inset_emu = 3;
    bool no_top_inset = 4;
  }
  oneof right_inset {
    int64 right_inset_emu = 5;
    bool no_right_inset = 6;
  }
  oneof bottom_inset {
    int64 bottom_inset_emu = 7;
    bool no_bottom_inset = 8;
  }
  oneof anchor {
    string vertical_anchor = 9;
    bool no_vertical_anchor = 10;
  }
  oneof wrapping {
    string wrap = 11;
    bool no_wrap = 12;
  }
  oneof auto_fit {
    string auto_fit_mode = 13;
    bool no_auto_fit_mode = 14;
  }
  oneof rotation {
    int32 rotation_angle_60000 = 15;
    bool no_rotation = 16;
  }
  oneof vertical_text {
    string vertical_text_mode = 17;
    bool no_vertical_text_mode = 18;
  }
  oneof vertical_overflow {
    string vertical_overflow_mode = 19;
    bool no_vertical_overflow_mode = 20;
  }
  oneof horizontal_overflow {
    string horizontal_overflow_mode = 21;
    bool no_horizontal_overflow_mode = 22;
  }
  oneof column_count {
    uint32 columns = 23;
    bool no_columns = 24;
  }
  oneof column_spacing {
    int64 column_spacing_emu = 25;
    bool no_column_spacing = 26;
  }
  oneof column_direction {
    bool right_to_left_columns = 27;
    bool no_column_direction = 28;
  }
  oneof upright_text {
    bool upright = 29;
    bool no_upright = 30;
  }
}

message PresentationTextStyle {
  optional bool bold = 1;
  optional bool italic = 2;
  optional double font_size_points = 3;
  optional string font_family = 4;
  oneof color {
    string color_rgb = 5;
    // One of the 16 public DrawingML theme tokens. Color transforms remain
    // source-bound rather than being flattened.
    string color_scheme = 6;
  }
}

message PresentationTextParagraph {
  optional uint32 level = 1;
  optional string alignment = 2;
  repeated PresentationTextRun runs = 3;
  // Unset means no direct marker for newly authored text and preserve an
  // unknown source marker during a source-bound edit.
  oneof bullet {
    bool no_bullet = 4;
    string bullet_character = 5;
    PresentationAutoNumberBullet auto_number = 6;
    PresentationPictureBullet picture_bullet = 16;
  }
  // Each unset style choice means no direct style for new text and preserve an
  // unmodeled source choice during a source-bound edit.
  oneof bullet_font {
    string bullet_font_family = 7;
    bool bullet_font_follow_text = 8;
  }
  oneof bullet_color {
    string bullet_color_rgb = 9;
    bool bullet_color_follow_text = 10;
    // One of the 16 public DrawingML theme tokens (for example accent1 or
    // tx1). Color transforms remain source-bound rather than being flattened.
    string bullet_color_scheme = 17;
  }
  oneof bullet_size {
    double bullet_size_points = 11;
    double bullet_size_percent = 12;
    bool bullet_size_follow_text = 13;
  }
  // Field 14 remains the original repeated-message wire shape. An empty list
  // preserves an unmodeled source list; no_tab_stops explicitly removes it.
  repeated PresentationTabStop tab_stops = 14;
  optional bool no_tab_stops = 15;
  // Values use DrawingML EMUs. Unset preserves source/inherited layout;
  // explicit no_* choices remove a modeled direct override.
  oneof left_margin {
    int64 margin_left_emu = 18;
    bool no_margin_left = 20;
  }
  oneof indentation {
    int64 indent_emu = 19;
    bool no_indent = 21;
  }
  // Point and multiplier choices retain the native DrawingML spcPts/spcPct
  // identity. A multiplier of 1.0 is 100%. Unset preserves source/inherited
  // spacing; explicit no_* choices remove a modeled direct override.
  oneof line_spacing {
    double line_spacing_points = 22;
    double line_spacing_multiplier = 23;
    bool no_line_spacing = 24;
  }
  oneof space_before {
    double space_before_points = 25;
    double space_before_multiplier = 26;
    bool no_space_before = 27;
  }
  oneof space_after {
    double space_after_points = 28;
    double space_after_multiplier = 29;
    bool no_space_after = 30;
  }
  // Direct a:defRPr semantics. Unset preserves source state; the explicit
  // no_* choice removes only modeled fields and retains unknown native
  // properties such as underline, script fonts, or color transforms.
  oneof default_run_style {
    PresentationTextStyle default_run_properties = 31;
    bool no_default_run_properties = 32;
  }
}

message PresentationPictureBullet {
  // Embedded pictures reference an envelope Asset. External pictures remain
  // non-fetched absolute http(s) URIs. Package relationship IDs are deliberately
  // absent because they are local codec details, not durable artifact identity.
  oneof source {
    string asset_id = 1;
    string uri = 2;
  }
}

message PresentationAutoNumberBullet {
  // ECMA-376 ST_TextAutonumberScheme token, for example arabicPeriod.
  string scheme = 1;
  optional uint32 start_at = 2;
}

message PresentationTabStop {
  int64 position_emu = 1;
  string alignment = 2;
}

message PresentationTextRun {
  // Text remains field 1 for binary compatibility with the initial public
  // schema. Moving it into this oneof makes the DrawingML a:r/a:br/a:fld
  // distinction explicit without changing its wire encoding.
  oneof content {
    string text = 1;
    bool line_break = 9;
    PresentationTextField field = 10;
  }
  optional bool bold = 2;
  optional bool italic = 3;
  optional double font_size_points = 4;
  optional string font_family = 5;
  optional string color_rgb = 6;
  // Unset preserves an unmodeled source click action. Explicit no_hyperlink
  // removes a previously modeled click action during a source-bound edit.
  oneof hyperlink {
    bool no_hyperlink = 7;
    PresentationRunHyperlink run_hyperlink = 8;
  }
}

message PresentationTextField {
  // DrawingML field IDs are canonical brace-wrapped UUIDs.
  string id = 1;
  string type = 2;
  // Cached display text retained when Office cannot recalculate the field.
  string text = 3;
}

message PresentationRunHyperlink {
  oneof target {
    string uri = 1;
    string slide_id = 2;
    string action = 3;
  }
  optional string tooltip = 4;
  optional string target_frame = 5;
  optional bool history = 6;
  optional bool highlight_click = 7;
}

message PresentationOpaqueElement {
  string element_name = 1;
  string text = 2;
  string raw_xml = 3;
  int64 left_emu = 4;
  int64 top_emu = 5;
  int64 width_emu = 6;
  int64 height_emu = 7;
}

message DocumentArtifact {
  string id = 1;
  string name = 2;
  repeated DocumentBlock blocks = 3;
}

message DocumentBlock {
  string id = 1;
  string name = 2;
  string style_id = 3;
  DocumentSourceBinding source = 4;

  oneof content {
    DocumentParagraph paragraph = 10;
    DocumentTable table = 11;
    DocumentOpaqueBlock opaque = 12;
    DocumentHyperlink hyperlink = 13;
    DocumentField field = 14;
  }
}

// The source binding makes partial semantic coverage loss-aware. Unchanged
// advanced WordprocessingML can stay in the validated source package, while an
// attempted edit to a block that is not yet modeled fails closed.
message DocumentSourceBinding {
  uint32 body_index = 1;
  string element_sha256 = 2;
  string semantic_sha256 = 3;
  bool editable = 4;
  // Hash of the source element after removing only the fields modeled by the
  // selected content case. It protects formatting and extension markup while
  // a source-bound edit changes modeled values in place.
  string residual_sha256 = 5;
}

message DocumentParagraph {
  string text = 1;
  repeated DocumentRun runs = 2;
  // Direct w:numPr identity plus the resolved source level definition. The
  // first source-bound slice permits text edits only; changing this shared
  // numbering graph remains fail-closed.
  DocumentNumbering numbering = 3;
}

message DocumentNumbering {
  uint32 numbering_id = 1;
  uint32 level = 2;
  uint32 abstract_numbering_id = 3;
  string number_format = 4;
  uint32 start = 5;
  string level_text = 6;
  // Friendly numbering-style identity resolved from w:styleLink or
  // w:numStyleLink. It remains source-bound in the text-only slice.
  string numbering_style_id = 7;
}

message DocumentRun {
  string text = 1;
  string style_id = 2;
  bool bold = 3;
  bool italic = 4;
  bool underline = 5;
}

message DocumentHyperlink {
  string text = 1;
  oneof target {
    string external_uri = 2;
    string internal_anchor = 3;
  }
  // Package-local source locator. It is not durable hyperlink identity and is
  // ignored by semantic comparison when a relationship is safely rewritten.
  string relationship_id = 4;
  optional string tooltip = 5;
  optional bool history = 6;
}

message DocumentField {
  string instruction = 1;
  string display = 2;
}

message DocumentTable {
  repeated DocumentTableRow rows = 1;
  // Effective logical grid width after applying row offsets and grid spans.
  // Imported source-preserving tables expose this as read-only topology.
  uint32 grid_columns = 2;
}

message DocumentTableRow {
  // Physical cell texts retained for backwards-compatible table consumers.
  repeated string cells = 1;
  // One entry per physical cell, in the same order as cells. Geometry is
  // source-bound; only entries marked editable permit text changes.
  repeated DocumentTableCell rich_cells = 2;
  uint32 grid_before = 3;
  uint32 grid_after = 4;
}

enum DocumentTableVerticalMerge {
  DOCUMENT_TABLE_VERTICAL_MERGE_UNSPECIFIED = 0;
  DOCUMENT_TABLE_VERTICAL_MERGE_RESTART = 1;
  DOCUMENT_TABLE_VERTICAL_MERGE_CONTINUE = 2;
}

message DocumentTableCell {
  uint32 grid_column = 1;
  uint32 column_span = 2;
  uint32 row_span = 3;
  DocumentTableVerticalMerge vertical_merge = 4;
  bool editable = 5;
}

message DocumentOpaqueBlock {
  string element_name = 1;
  string text = 2;
}
